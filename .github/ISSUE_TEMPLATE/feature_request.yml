name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](https://github.com/arunrajiah/frostwatch/blob/main/ROADMAP.md) first — your idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case. "I'm trying to do X but I can't because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How would it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried or considered instead?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cost analysis
        - Anomaly detection
        - LLM / AI features
        - Alerts (Slack / email)
        - Web UI
        - CLI
        - Snowflake integration
        - Deployment / Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
