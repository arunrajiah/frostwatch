backend:
  - changed-files:
    - any-glob-to-any-file: "frostwatch/**/*"

frontend:
  - changed-files:
    - any-glob-to-any-file: "frontend/src/**/*"

ci:
  - changed-files:
    - any-glob-to-any-file: ".github/workflows/**/*"

docs:
  - changed-files:
    - any-glob-to-any-file:
      - "*.md"
      - "docs/**/*"

docker:
  - changed-files:
    - any-glob-to-any-file:
      - "Dockerfile"
      - "docker-compose.yml"

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - "pyproject.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"

security:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/security.yml"
      - "SECURITY.md"
