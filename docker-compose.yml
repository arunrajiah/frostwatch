services:
  frostwatch:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - frostwatch-data:/data
      - ./frostwatch.yaml:/data/config.yaml:ro   # mount your config file
    environment:
      # Override any config value via env var (all optional if config.yaml is mounted)
      - FROSTWATCH_DATA_DIR=/data
      # Uncomment and set secrets here instead of in config.yaml if preferred:
      # - FROSTWATCH_SNOWFLAKE_PASSWORD=
      # - FROSTWATCH_LLM_API_KEY=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/sync/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  frostwatch-data:
